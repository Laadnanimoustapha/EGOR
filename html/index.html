<!DOCTYPE html>
<html lang="en">
<head>
    <!-- FULLY MAID BY LAADNANI -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>EGOR</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <span class="subtitle">PYTHON SERVER UTILITY</span>
            <h1>Password Generator</h1>

            <div class="section">
                <label class="section-label">COMPLEXITY LENGTH</label>
                <div class="input-row">
                    <div class="length-input-wrapper">
                        <input type="number" id="length" min="4" max="64" value="16" placeholder="16">
                        <span class="input-suffix">chars</span>
                    </div>
                    <button class="btn-generate" onclick="GeneratePassword()">Generate <span class="bolt">&#9889;</span></button>
                </div>
            </div>

            <div class="section">
                <label class="section-label">GENERATED OUTPUT</label>
                <div class="output-wrapper">
                    <input type="text" id="result" readonly placeholder="Your password...">
                    <button class="btn-copy" onclick="copyPassword()">
                        <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy
                    </button>
                </div>
            </div>
        </div>
    </div>
<script src="main.js"></script>
</body>
</html>
